[API]
# Nugget API endpoint - adjust port if needed (default API_PORT=8001)
endpoint_url = http://localhost:8001/api/v1/ingest/feedback
method = POST
timeout_seconds = 30

[API_AUTH]
active = False
username = XYZ
password = XYZ

[CSV]
sales_file_path = ./
sales_file_name = sales.csv
campaign_product_file_path = ./
campaign_product_file_name = campaign_product.csv

[LOG]
log_level = INFO
log_file = api_pusher.log
log_format = %%(asctime)s - %%(levelname)s - %%(filename)s - %%(funcName)s - %%(lineno)d - %%(message)s

[OLLAMA]
# Ollama: 127.0.0.1:11434 | LM Studio: 127.0.0.1:1234 (if Ollama-compatible server enabled)
ollama_url = 127.0.0.1:11434
# Smallest: tinyllama (~638MB). Others: phi3:mini, llama3.2:1b
ollama_model = tinyllama

[GENERATION]
# ollama = use local LLM (requires Ollama running + model pulled)
# manual = use random functions (no dependencies)
mode = ollama
